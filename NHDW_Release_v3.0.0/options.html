<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NHentai Downloader Options</title>
  <style>
    body {
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { color: #4CAF50; }
    .option-group {
      margin: 20px 0;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 6px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="number"], select {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      width: 100%;
      max-width: 200px;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background-color: #45a049; }
    .saved-msg {
      color: #4CAF50;
      margin-left: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>⚙️ NHentai Downloader Options</h1>
  
  <div class="option-group">
    <label for="download-path">Download Folder (Chrome Default)</label>
    <p style="font-size: 12px; color: #666;">Downloads are saved to your Chrome default download folder. Change this in Chrome settings.</p>
  </div>
  
  <div class="option-group">
    <label for="image-quality">Image Quality Preference</label>
    <select id="image-quality">
      <option value="original">Original (Best Quality)</option>
      <option value="high">High Quality</option>
    </select>
  </div>
  
  <div class="option-group">
    <label for="filename-format">Filename Format</label>
    <select id="filename-format">
      <option value="title">Gallery Title</option>
      <option value="id">Gallery ID</option>
      <option value="both">Title + ID</option>
    </select>
  </div>
  
  <button id="save-btn">Save Options</button>
  <span class="saved-msg" id="saved-msg">✅ Options saved!</span>
  
  <script>
    // Load saved options
    document.addEventListener('DOMContentLoaded', () => {
      chrome.storage.sync.get(['imageQuality', 'filenameFormat'], (result) => {
        if (result.imageQuality) {
          document.getElementById('image-quality').value = result.imageQuality;
        }
        if (result.filenameFormat) {
          document.getElementById('filename-format').value = result.filenameFormat;
        }
      });
    });
    
    // Save options
    document.getElementById('save-btn').addEventListener('click', () => {
      const imageQuality = document.getElementById('image-quality').value;
      const filenameFormat = document.getElementById('filename-format').value;
      
      chrome.storage.sync.set({
        imageQuality: imageQuality,
        filenameFormat: filenameFormat
      }, () => {
        const msg = document.getElementById('saved-msg');
        msg.style.display = 'inline';
        setTimeout(() => msg.style.display = 'none', 2000);
      });
    });
  </script>
</body>
</html>
